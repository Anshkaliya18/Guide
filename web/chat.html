<!doctype html>
<html lang="en"><head>
    <meta charset="UTF-8">
    <title>Earth Explorer – Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&amp;family=Outfit:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
    body {font-family: var(--font-body); background: var(--bg); color: var(--text); margin: 0;}
    .page-wrapper {padding-top: 80px; /* offset for fixed nav */}
    .chat-section {max-width: 900px; margin: 2rem auto; padding: 0 1rem;}
    .chat-header {text-align: center; margin-bottom: 1.5rem;}
    .chat-header h1 {font-family: var(--font-display); font-size: clamp(2rem,4vw,3rem); color: var(--gold);}
    #chat {
          background: var(--bg-1);
          border: 1px solid var(--border);
          border-radius: var(--radius);
          padding: 1rem;
          height: 60vh;
          overflow-y: auto;
          display: flex;
          flex-direction: column;
          gap: 0.75rem;
    }
    .msg {padding: 0.75rem 1rem; border-radius: var(--radius-sm); max-width: 80%; line-height: 1.4;}
    .msg.user {align-self: flex-end; background: var(--gold-dim); color: var(--gold); font-weight: 600;}
    .msg.bot {align-self: flex-start; background: var(--bg-2); color: var(--text-2);}
    .input-area {display: flex; gap: 0.5rem; margin-top: 1rem;}
    #msgInput {
          flex: 1;
          padding: 0.6rem 0.9rem;
          border: 1px solid var(--border-2);
          border-radius: var(--radius-sm);
          background: var(--bg-2);
          color: var(--text);
          font-family: var(--font-body);
    }
    #msgInput::placeholder {color: var(--text-3);}
    #sendBtn {
          padding: 0.6rem 1.2rem;
          border: none;
          border-radius: var(--radius-sm);
          background: var(--gold);
          color: var(--bg);
          font-weight: 500;
          cursor: pointer;
          transition: opacity 0.2s, transform 0.2s;
    }
    #sendBtn:hover {opacity: 0.9; transform: translateY(-1px);}
    /* Loading overlay while waiting for bot reply */
    .loader-overlay {
          position: absolute;
          inset: 0;
          background: rgba(0,0,0,0.15);
          display: flex;
          align-items: center;
          justify-content: center;
          border-radius: var(--radius);
          opacity: 0;
          pointer-events: none;
          transition: opacity 0.2s;
    }
    .loader-overlay.active {opacity: 1; pointer-events: all;}
    .loader-spinner {
          border: 4px solid var(--bg-2);
          border-top: 4px solid var(--gold);
          border-radius: 50%;
          width: 30px;
          height: 30px;
          animation: spin 1s linear infinite;
    }
    @keyframes spin {to {transform: rotate(360deg);}}
    @media (max-width: 600px) {
          #chat {height: 50vh;}
    }
    </style>
    <style type="text/css" id="mytempCss">._8mqQwQ { display: none; } ._1TWLMK.icF5zO { opacity: 0.01; }</style></head>
    <body class="page-ready">
    <nav class="nav">
    <a href="index.html" class="nav-logo"><span class="dot"></span>Earth Explorer</a>
    <ul class="nav-links">
    <li><a href="index.html"><span class="nav-icon">◎</span> Home</a></li>
    <li><a href="explore.html"><span class="nav-icon">✦</span> Explore</a></li>
    <li><a href="saved.html"><span class="nav-icon">◈</span> Saved</a></li>
    <li><a href="about.html"><span class="nav-icon">◉</span> About</a></li>
    <li><a href="chat.html"><span class="nav-icon">◉</span> chat</a></li></ul>
    <a href="explore.html" class="nav-cta">Open Explorer</a>
    <button class="nav-hamburger" id="navHam" aria-label="Menu" aria-expanded="false"><span></span><span></span><span></span></button>
    </nav>
    <div class="mobile-menu" id="mobileMenu"></div>
    <div class="page-wrapper">
    <section class="chat-section">
    <header class="chat-header">
          <h1>Chat with Earth Explorer</h1>
    </header>
    <div id="chat" class="relative">
          <div class="loader-overlay" id="loaderOverlay"><div class="loader-spinner"></div></div>
    </div>
    <div class="input-area">
          <input type="text" id="msgInput" placeholder="Ask about a place, coordinates, or anything..." autocomplete="off">
          <button id="sendBtn" class="btn btn-gold">Send</button>
    </div>
    </section>
    </div>
    <script src="chat.js"></script>
    <script>
    const loader = document.getElementById('loaderOverlay');
      // Override addMessage to hide the loader when a new message is displayed.
      const originalAddMessage = window.addMessage;
      window.addMessage = function(text, className) {
            if (loader) loader.classList.remove('active');
            originalAddMessage(text, className);
      };
      // Wrap sendMessage to ensure the loader is cleared even if the original
      // implementation already manages it. This prevents the overlay from staying
      // active indefinitely.
      const originalSendMessage = window.sendMessage;
      window.sendMessage = async function() {
            try {
                  await originalSendMessage();
            } finally {
                  if (loader) loader.classList.remove('active');
            }
      };
    </script>
    

</body></html>
